version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 100
    labels:
      - "dependencies"
      - "github-actions"
  - package-ecosystem: "julia"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      all-julia-packages:
        patterns:
          - "*"
